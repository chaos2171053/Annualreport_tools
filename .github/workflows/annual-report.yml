name: annual-report

on:
  workflow_dispatch:
    inputs:
      excel_file:
        description: Path to Excel file with annual report links. Optional when report_url is provided.
        required: false
        default: ""
      report_url:
        description: Direct annual report PDF URL. Optional when excel_file is provided.
        required: false
        default: ""
      company_name:
        description: Company short name for direct report_url output naming
        required: false
        default: ""
      code:
        description: Stock code, for example 600519
        required: true
      year:
        description: Report year, for example 2023
        required: true
      keep_pdf:
        description: Keep PDF in artifact
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Fetch and convert annual report
        run: |
          args=(
            --code "${{ inputs.code }}"
            --year "${{ inputs.year }}"
            --out out
          )
          if [ "${{ inputs.keep_pdf }}" = "true" ]; then
            args+=(--keep-pdf)
          fi
          if [ -n "${{ inputs.report_url }}" ]; then
            args+=(--report-url "${{ inputs.report_url }}")
            if [ -n "${{ inputs.company_name }}" ]; then
              args+=(--company-name "${{ inputs.company_name }}")
            fi
          elif [ -n "${{ inputs.excel_file }}" ]; then
            args+=(--excel-file "${{ inputs.excel_file }}")
          else
            echo "Either excel_file or report_url is required" >&2
            exit 2
          fi
          python "2.pdf_batch_converter.py" "${args[@]}"
      - name: Upload TXT artifact
        uses: actions/upload-artifact@v4
        with:
          name: annual-report-${{ inputs.code }}-${{ inputs.year }}
          path: out/
